name: Deploy to Dev

on:
  push:
    branches:
      - develop
  workflow_dispatch:

permissions: {}

jobs:
  deploy:
    environment: dev
    # Do not deploy in the main repository, only in user projects
    if: github.repository_owner != 'fastapi'
    runs-on:
      - self-hosted
      - dev
    env:
      # Backend only accepts local | staging | production; dev maps to staging.
      ENVIRONMENT: staging
      DOMAIN: ${{ secrets.DOMAIN_DEV }}
      STACK_NAME: ${{ secrets.STACK_NAME_DEV }}
      SECRET_KEY: ${{ secrets.SECRET_KEY }}
      ITCH_OWNER_USERNAME: ${{ secrets.ITCH_OWNER_USERNAME }}
      SMTP_HOST: ${{ secrets.SMTP_HOST }}
      SMTP_USER: ${{ secrets.SMTP_USER }}
      SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
      EMAILS_FROM_EMAIL: ${{ secrets.EMAILS_FROM_EMAIL }}
      POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
      SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - run: docker compose -f compose.yml --project-name ${{ secrets.STACK_NAME_DEV }} build
      - run: docker compose -f compose.yml --project-name ${{ secrets.STACK_NAME_DEV }} up -d
